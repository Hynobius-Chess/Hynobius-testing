name: AB Test Matrix

on:
  workflow_dispatch:
    inputs:
      baseline_ref:
        description: "Baseline ref"
        required: true
        default: "main"

      candidate_ref:
        description: "Candidate ref"
        required: true
        default: "dev"

      pairs_per_batch:
        description: "Opening pairs per batch"
        required: true
        default: "20"

      start_batch:
        description: "Start batch index"
        required: true
        default: "0"

      num_batches:
        description: "Number of batches to run (batch_number * 40 = final game number)"
        required: true
        default: "5"

      tc:
        description: "Time control"
        required: true
        default: "10+0.1"

      sprt:
        description: "Enable SPRT"
        required: true
        default: "true"

      sprt_elo0:
        description: "SPRT Elo0"
        required: true
        default: "0"

      sprt_elo1:
        description: "SPRT Elo1"
        required: true
        default: "10"

      sprt_alpha:
        description: "SPRT alpha"
        required: true
        default: "0.05"

      sprt_beta:
        description: "SPRT beta"
        required: true
        default: "0.05"

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.make-matrix.outputs.matrix }}

    steps:
      - name: Make batch matrix
        id: make-matrix
        shell: pwsh
        run: |
          $start = [int]"${{ inputs.start_batch }}"
          $count = [int]"${{ inputs.num_batches }}"

          if ($count -le 0) {
            throw "num_batches must be > 0"
          }

          $batches = @()
          for ($i = $start; $i -lt $start + $count; $i++) {
            $batches += $i
          }

          $json = @{ batch = $batches } | ConvertTo-Json -Compress

          Write-Host "Generated matrix: $json"
          "matrix=$json" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

  run-batches:
    needs: prepare

    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.prepare.outputs.matrix) }}

    uses: ./.github/workflows/ab_test_single.yml
    with:
      baseline_ref: ${{ inputs.baseline_ref }}
      candidate_ref: ${{ inputs.candidate_ref }}
      batch_index: ${{ matrix.batch }}
      pairs_per_batch: ${{ inputs.pairs_per_batch }}
      tc: ${{ inputs.tc }}

  merge-results:
    name: Merge AB results
    runs-on: [ab-test]
    needs: run-batches
    if: always()

    steps:
      - name: Checkout testing repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          path: testing

      - name: Prepare portable Python
        shell: powershell
        run: |
          $version = "3.12.10"
          $pythonDir = "$env:RUNNER_TEMP\python-$version"
          $pythonExe = "$pythonDir\python.exe"

          if (!(Test-Path $pythonExe)) {
            $zip = "$env:RUNNER_TEMP\python-$version-embed-amd64.zip"
            $url = "https://www.python.org/ftp/python/$version/python-$version-embed-amd64.zip"

            Invoke-WebRequest -Uri $url -OutFile $zip

            New-Item -ItemType Directory -Force $pythonDir | Out-Null
            Expand-Archive -Path $zip -DestinationPath $pythonDir -Force
          }

          & $pythonExe --version
          "PYTHON_EXE=$pythonExe" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Download batch artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: ab-batch-*
          path: all-results
          merge-multiple: true

      - name: List downloaded files
        shell: powershell
        run: |
          Get-ChildItem all-results -Recurse | Select-Object FullName

      - name: Merge results
        shell: powershell
        run: |
          $sprtArgs = @()
          if ("${{ inputs.sprt }}" -eq "true") {
            $sprtArgs += "--sprt"
            $sprtArgs += "--sprt-elo0"
            $sprtArgs += "${{ inputs.sprt_elo0 }}"
            $sprtArgs += "--sprt-elo1"
            $sprtArgs += "${{ inputs.sprt_elo1 }}"
            $sprtArgs += "--sprt-alpha"
            $sprtArgs += "${{ inputs.sprt_alpha }}"
            $sprtArgs += "--sprt-beta"
            $sprtArgs += "${{ inputs.sprt_beta }}"
          }

          & "$env:PYTHON_EXE" testing/merge_ab.py `
            --input-dir all-results `
            --out-dir merged `
            --expected-batches ${{ inputs.num_batches }} `
            @sprtArgs

      - name: Write GitHub step summary
        shell: powershell
        run: |
          if (Test-Path merged/summary.md) {
            Get-Content merged/summary.md | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Append
          } else {
            "summary.md not found" | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Append
          }

      - name: Upload merged result
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: ab-test-merged-result
          path: merged/