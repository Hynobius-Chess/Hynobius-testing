name: AB Test Manual

on:
  workflow_dispatch:
    inputs:
      baseline_ref:
        description: "Baseline git ref (tag / branch / commit)"
        required: false
        default: "v0.2.6"
        type: string

      candidate_ref:
        description: "Candidate git ref (tag / branch / commit), empty = caller SHA"
        required: false
        default: ""
        type: string

      mode:
        description: "Match mode: depth or tc"
        required: false
        default: "tc"
        type: string

      depth:
        description: "Search depth when mode=depth"
        required: false
        default: "5"
        type: string

      tc:
        description: "Time control when mode=tc, e.g. 10+0.1"
        required: false
        default: "10+0.1"
        type: string

      opening_pairs:
        description: "Number of paired openings"
        required: false
        default: "10"
        type: string

      opening_file:
        description: "Opening PGN file path on runner"
        required: false
        default: "candidate/bench/openings.pgn"
        type: string

permissions:
  contents: read

jobs:
  run-ab:
    uses: ./.github/workflows/ab-test-reusable.yml
    with:
      baseline_ref: ${{ inputs.baseline_ref }}
      candidate_ref: ${{ inputs.candidate_ref }}
      mode: ${{ inputs.mode }}
      depth: ${{ inputs.depth }}
      tc: ${{ inputs.tc }}
      opening_pairs: ${{ inputs.opening_pairs }}
      opening_file: ${{ inputs.opening_file }}

  show-result:
    runs-on: ubuntu-latest
    needs: run-ab
    steps:
      - name: Print outputs
        run: |
          echo 'artifact_name=${{ needs.run-ab.outputs.artifact_name }}'
          echo 'elo_diff=${{ needs.run-ab.outputs.elo_diff }}'
          echo 'elo_error=${{ needs.run-ab.outputs.elo_error }}'
          echo 'los=${{ needs.run-ab.outputs.los }}'
          echo '${{ needs.run-ab.outputs.result_json }}'