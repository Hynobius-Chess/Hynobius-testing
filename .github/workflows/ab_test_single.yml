name: AB Test Single Batch

on:
  workflow_dispatch:
    inputs:
      baseline_ref:
        description: "Baseline ref"
        required: true
        default: "main"

      candidate_ref:
        description: "Candidate ref"
        required: true
        default: "dev"

      batch_index:
        description: "Batch index"
        required: true
        default: "0"

      pairs_per_batch:
        description: "Opening pairs per batch"
        required: true
        default: "20"

      tc:
        description: "Time control"
        required: true
        default: "10+0.1"

jobs:
  run-ab-batch:
    runs-on: [ab-test]

    steps:
      - name: Checkout candidate
        uses: actions/checkout@v4
        with:
          repository: Hynobius-Chess/Hynobius
          fetch-depth: 0
          ref: ${{ inputs.candidate_ref != '' && inputs.candidate_ref || github.sha }}
          path: candidate

      - name: Checkout baseline
        uses: actions/checkout@v4
        with:
          repository: Hynobius-Chess/Hynobius
          fetch-depth: 0
          ref: ${{ inputs.baseline_ref }}
          path: baseline
  
      - name: Check Cute Chess CLI
        shell: powershell
        run: |
          $cutechess = Get-Command cutechess-cli.exe -ErrorAction SilentlyContinue

          if ($null -eq $cutechess) {
            throw "cutechess-cli.exe not found in PATH"
          }

          Write-Host "Found cutechess-cli at: $($cutechess.Source)"
          cutechess-cli.exe --version

      - name: Resolve SHAs
        shell: powershell
        run: |
          $baselineSha = git -C baseline rev-parse HEAD
          $candidateSha = git -C candidate rev-parse HEAD

          "BASELINE_SHA=$baselineSha" | Out-File -FilePath $env:GITHUB_ENV -Append
          "CANDIDATE_SHA=$candidateSha" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Build candidate
        shell: powershell
        run: |
          cmake -S candidate -B candidate/build -G "Ninja" -DCMAKE_BUILD_TYPE=Release
          cmake --build candidate/build --config Release

      - name: Build baseline
        shell: powershell
        run: |
          cmake -S baseline -B baseline/build -G "Ninja" -DCMAKE_BUILD_TYPE=Release
          cmake --build baseline/build --config Release

      - name: Resolve executable paths
        shell: powershell
        run: |
          $baselineCandidates = @(
            "baseline/build/Release/chess-analysis-engine.exe",
            "baseline/build/chess-analysis-engine.exe",
            "baseline/build/Release/Hynobius.exe",
            "baseline/build/Hynobius.exe"
          )

          $candidateCandidates = @(
            "candidate/build/Release/chess-analysis-engine.exe",
            "candidate/build/chess-analysis-engine.exe",
            "candidate/build/Release/Hynobius.exe",
            "candidate/build/Hynobius.exe"
          )

          $baselineExe = $null
          foreach ($p in $baselineCandidates) {
            if (Test-Path $p) {
              $baselineExe = (Resolve-Path $p).Path
              break
            }
          }
          if (-not $baselineExe) { throw "Baseline exe not found" }

          $candidateExe = $null
          foreach ($p in $candidateCandidates) {
            if (Test-Path $p) {
              $candidateExe = (Resolve-Path $p).Path
              break
            }
          }
          if (-not $candidateExe) { throw "Candidate exe not found" }

          "BASELINE_EXE=$baselineExe" | Out-File -FilePath $env:GITHUB_ENV -Append
          "CANDIDATE_EXE=$candidateExe" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Run AB batch
        shell: powershell
        run: |
          python testing/run_ab.py `
            --cutechess "cutechess-cli" `
            --baseline $env:BASELINE_EXE `
            --candidate $env:CANDIDATE_EXE `
            --opening-file candidate/bench/openings_filtered.pgn `
            --batch-index ${{ inputs.batch_index }} `
            --pairs-per-batch ${{ inputs.pairs_per_batch }} `
            --tc "${{ inputs.tc }}" `
            --out-dir results

      - name: Upload result
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: ab-batch-${{ inputs.batch_index }}
          path: results/