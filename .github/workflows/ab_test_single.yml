name: AB Test Single Batch

on:
  workflow_dispatch:
    inputs:
      baseline_ref:
        description: "Baseline ref"
        required: true
        default: "main"

      candidate_ref:
        description: "Candidate ref"
        required: true
        default: "dev"

      batch_index:
        description: "Batch index"
        required: true
        default: "0"

      pairs_per_batch:
        description: "Opening pairs per batch"
        required: true
        default: "20"

      tc:
        description: "Time control"
        required: true
        default: "10+0.1"

jobs:
  run-ab-batch:
    runs-on: [ab-test]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Checkout baseline
        uses: actions/checkout@v4
        with:
          repository: Hynobius-Chess/Hynobius
          fetch-depth: 0
          ref: ${{ inputs.baseline_ref }}
          path: baseline

      - name: Checkout candidate
        uses: actions/checkout@v4
        with:
          repository: Hynobius-Chess/Hynobius
          fetch-depth: 0
          ref: ${{ inputs.candidate_ref != '' && inputs.candidate_ref || github.sha }}
          path: candidate

      - name: Check Cute Chess CLI
        shell: pwsh
        run: |
          $cutechess = Get-Command cutechess-cli.exe -ErrorAction SilentlyContinue

          if ($null -eq $cutechess) {
            throw "cutechess-cli.exe not found in PATH"
          }

          Write-Host "Found cutechess-cli at: $($cutechess.Source)"
          cutechess-cli.exe --version

      - name: Build baseline
        shell: pwsh
        run: |
          cmake -S baseline -B baseline/build -DCMAKE_BUILD_TYPE=Release
          cmake --build baseline/build --config Release

          New-Item -ItemType Directory -Force engines
          Copy-Item baseline/build/Hynobius.exe engines/baseline.exe

      - name: Build candidate
        shell: pwsh
        run: |
          cmake -S candidate -B candidate/build -DCMAKE_BUILD_TYPE=Release
          cmake --build build-candidate --config Release

          New-Item -ItemType Directory -Force engines
          Copy-Item candidate/build/Hynobius.exe engines/candidate.exe

      - name: Run AB batch
        shell: pwsh
        run: |
          python run_ab.py `
            --cutechess "cutechess-cli" `
            --baseline engines/baseline.exe `
            --candidate engines/candidate.exe `
            --opening-file bench/openings_filtered.pgn `
            --batch-index ${{ inputs.batch_index }} `
            --pairs-per-batch ${{ inputs.pairs_per_batch }} `
            --tc "${{ inputs.tc }}" `
            --out-dir results

      - name: Upload result
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: ab-batch-${{ inputs.batch_index }}
          path: results/